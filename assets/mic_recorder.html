<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 46px;
  }
  .mic-btn {
    width: 100%;
    height: 46px;
    border-radius: 12px;
    background: rgba(11, 17, 30, 0.95);
    border: 1.5px solid rgba(122, 178, 211, 0.4);
    color: #7AB2D3;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(122, 178, 211, 0.15);
    font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-weight: 600;
    gap: 6px;
  }
  .mic-btn:hover {
    border-color: #7AB2D3;
    box-shadow: 0 0 15px rgba(122, 178, 211, 0.4);
    transform: scale(1.02);
    color: #B9E5E8;
  }
  .mic-btn.recording {
    background: rgba(239, 68, 68, 0.2);
    border-color: #ef4444;
    color: #ef4444;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }
</style>
</head>
<body>
  <div class="mic-btn" id="micBtn" onclick="toggleRecognition()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mic" width="16" height="16">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
    <span>Speak</span>
  </div>
  <script>
    var recognition;
    var isRecording = false;
    var micBtn = document.getElementById('micBtn');
    var startVal = '';
    var silenceTimer = null;

    // Handle Enter key inside the iframe (focus stays here often after voice)
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        try {
          var pd = window.parent.document;
          var chatInput = pd.querySelector('div[data-testid="stTextInput"] input');
          if (chatInput && chatInput.value.trim().length > 0) {
            e.preventDefault();
            e.stopPropagation();
            var form = chatInput.closest('form');
            if (form) {
              if (typeof form.requestSubmit === 'function') {
                form.requestSubmit();
              } else {
                var sendBtn = pd.querySelector('button[data-testid="stFormSubmitButton"]');
                if (sendBtn) sendBtn.click();
              }
            }
          }
        } catch (err) {
          console.error("Iframe Enter handler error", err);
        }
      }
    });

    function toggleRecognition() {
      if (isRecording) {
        stopRecognition();
      } else {
        startRecognition();
      }
    }

    function resetSilenceTimer() {
      if (silenceTimer) {
        clearTimeout(silenceTimer);
      }
      silenceTimer = setTimeout(function() {
        console.log("Silence timeout reached. Auto stopping.");
        stopRecognition();
      }, 3000);
    }

    function startRecognition() {
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!window.SpeechRecognition) {
        alert("Web Speech API is not supported in this browser. Please use Google Chrome.");
        return;
      }
      
      try {
        var pd = window.parent.document;
        var chatInput = pd.querySelector('div[data-testid="stTextInput"] input');
        startVal = chatInput ? chatInput.value : '';
      } catch (e) {
        startVal = '';
      }

      recognition = new window.SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-IN';

      recognition.onstart = function() {
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.querySelector('span').innerText = 'Listening';
        resetSilenceTimer();
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error", event);
        stopRecognition();
      };

      recognition.onend = function() {
        stopRecognition();
      };

      recognition.onresult = function(event) {
        resetSilenceTimer();
        
        var finalTranscript = '';
        var interimTranscript = '';
        
        for (var i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        var text = finalTranscript || interimTranscript;
        if (text) {
          try {
            var pd = window.parent.document;
            var chatInput = pd.querySelector('div[data-testid="stTextInput"] input');
            if (chatInput) {
              var prefix = startVal ? startVal.trim() + ' ' : '';
              var fullVal = prefix + text;
              
              var setter = Object.getOwnPropertyDescriptor(window.parent.HTMLInputElement.prototype, "value").set;
              if (setter) {
                setter.call(chatInput, fullVal);
              } else {
                chatInput.value = fullVal;
              }
              
              // Dispatch events for both React state update and Streamlit state collection
              chatInput.dispatchEvent(new Event('input', { bubbles: true }));
              chatInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
          } catch (e) {
            console.error("Error setting chat input value", e);
          }
        }
      };

      recognition.start();
    }

    function stopRecognition() {
      isRecording = false;
      micBtn.classList.remove('recording');
      var label = micBtn.querySelector('span');
      if (label) label.innerText = 'Speak';
      if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
      }
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
      
      // Auto-focus parent input on stop so the user can edit or press Enter immediately!
      try {
        var pd = window.parent.document;
        var chatInput = pd.querySelector('div[data-testid="stTextInput"] input');
        if (chatInput) {
          chatInput.focus();
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
